<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Galaxy Dragon 3D Title</title>
<style>
:root{color-scheme:dark;--panel:rgba(8,10,18,.88)}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:transparent;font-family:system-ui,-apple-system,sans-serif}
canvas{display:block;width:100%;height:100%;touch-action:none}
#app{position:fixed;inset:0;background:transparent}
#status{position:fixed;left:max(12px,env(safe-area-inset-left));top:max(12px,env(safe-area-inset-top));z-index:5;color:#d7eaff;font-size:12px;text-shadow:0 2px 8px #000}
#menuButton{position:fixed;right:max(12px,env(safe-area-inset-right));top:max(12px,env(safe-area-inset-top));z-index:12;border:1px solid #ffffff33;background:#070a12cc;color:#fff;border-radius:999px;padding:10px 14px;font-weight:700;backdrop-filter:blur(14px)}
#panel{position:fixed;z-index:11;left:max(10px,env(safe-area-inset-left));right:max(10px,env(safe-area-inset-right));bottom:max(10px,env(safe-area-inset-bottom));max-width:900px;max-height:54svh;overflow:auto;margin:auto;padding:14px;border:1px solid #ffffff2b;border-radius:20px;background:var(--panel);backdrop-filter:blur(18px);box-shadow:0 20px 70px #000a;transition:.25s}
#panel.hidden{opacity:0;transform:translateY(120%);pointer-events:none}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
label{display:grid;gap:5px;color:#d3d8e6;font-size:12px}
input,select,button{font:inherit}
input[type=text],select{width:100%;min-width:0;height:38px;border:1px solid #ffffff25;border-radius:10px;background:#111827;color:#fff;padding:0 10px}
input[type=range]{width:100%;accent-color:#a200ff}
input[type=color]{width:100%;height:38px;border:0;background:transparent}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.actions button{border:1px solid #ffffff25;background:#ffffff12;color:#fff;border-radius:11px;padding:10px 13px}
.actions .primary{background:#e7efff;color:#06101f}
.small{font-size:11px;color:#aeb8ca;margin-top:8px}
@media(max-width:720px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}#panel{max-height:50svh}}
</style>
</head>
<body>
<div id="app"></div>
<div id="status">Loading 3D text…</div>
<button id="menuButton">Hide menu</button>

<section id="panel">
  <div class="grid">
    <label>Top text<input id="text1" type="text" value="GALAXY" maxlength="16"></label>
    <label>Bottom text<input id="text2" type="text" value="DRAGON" maxlength="16"></label>
    <label>Glow color<input id="color" type="color" value="#9b24ff"></label>
    <label>Background
      <select id="background">
        <option value="transparent">Transparent</option>
        <option value="black" selected>Black</option>
        <option value="green">Green screen</option>
      </select>
    </label>
    <label>Text size <span id="sizeOut">1.00×</span><input id="size" type="range" min=".55" max="1.25" step=".01" value=".82"></label>
    <label>Animation speed <span id="speedOut">1.00×</span><input id="speed" type="range" min=".35" max="2.5" step=".05" value="1"></label>
    <label>Bloom <span id="bloomOut">1.25</span><input id="bloom" type="range" min=".2" max="2.5" step=".05" value="1.25"></label>
    <label>Letter stagger <span id="staggerOut">0.13 s</span><input id="stagger" type="range" min=".03" max=".35" step=".01" value=".13"></label>
    <label>Second-line delay <span id="lineDelayOut">0.85 s</span><input id="lineDelay" type="range" min="0" max="3" step=".05" value=".85"></label>
    <label>Line spacing <span id="lineGapOut">1.35</span><input id="lineGap" type="range" min=".65" max="2.2" step=".05" value="1.35"></label>
    <label>Camera zoom <span id="zoomOut">7.6</span><input id="zoom" type="range" min="5.8" max="11" step=".1" value="7.6"></label>
    <label>Motion <span id="motionOut">1.00×</span><input id="motion" type="range" min=".3" max="1.8" step=".05" value="1"></label>
  </div>
  <div class="actions">
    <button class="primary" id="replay">Replay exact-style sequence</button>
    <button id="save">Save settings</button>
    <button id="reset">Reset</button>
  </div>
  <div class="small">Tip: for CapCut, select Green screen, hide the menu, replay, and screen-record.</div>
</section>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "troika-three-text": "https://cdn.jsdelivr.net/npm/troika-three-text@0.52.4/dist/troika-three-text.esm.js"
  }
}
</script>
<script type="module" src="./main.js"></script>
</body>
</html>
