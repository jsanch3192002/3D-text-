<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Galaxy Dragon 3D Title</title>
<style>
@font-face{font-family:OverThere;src:url('./Over%20There.ttf') format('truetype');font-display:swap}
:root{color-scheme:dark;--panel:rgba(7,9,17,.9)}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#000;font-family:system-ui,-apple-system,sans-serif}
#app,canvas{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
#status{position:fixed;left:max(12px,env(safe-area-inset-left));top:max(12px,env(safe-area-inset-top));z-index:20;color:#ddebff;font-size:12px;text-shadow:0 2px 8px #000;pointer-events:none}
#menuButton{position:fixed;right:max(12px,env(safe-area-inset-right));top:max(12px,env(safe-area-inset-top));z-index:30;border:1px solid #ffffff36;background:#070a12dc;color:#fff;border-radius:999px;padding:11px 15px;font-weight:750;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
#panel{position:fixed;z-index:25;left:max(10px,env(safe-area-inset-left));right:max(10px,env(safe-area-inset-right));bottom:max(10px,env(safe-area-inset-bottom));max-width:920px;max-height:56svh;overflow:auto;margin:auto;padding:14px;border:1px solid #ffffff2b;border-radius:20px;background:var(--panel);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 20px 70px #000b;transition:transform .25s,opacity .25s}
#panel.hidden{opacity:0;transform:translateY(calc(100% + 30px));pointer-events:none}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}label{display:grid;gap:5px;color:#d3d8e6;font-size:12px}
input,select,button{font:inherit}input[type=text],select{width:100%;min-width:0;height:38px;border:1px solid #ffffff25;border-radius:10px;background:#111827;color:#fff;padding:0 10px}
input[type=range]{width:100%;accent-color:#7928ff}input[type=color]{width:100%;height:38px;border:0;background:transparent}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.actions button{border:1px solid #ffffff25;background:#ffffff12;color:#fff;border-radius:11px;padding:10px 13px}.actions .primary{background:#e7efff;color:#06101f;font-weight:750}.small{font-size:11px;color:#aeb8ca;margin-top:8px}
#error{display:none;position:fixed;inset:70px 15px auto;z-index:40;max-width:760px;margin:auto;background:#2b0d16f2;border:1px solid #ff829d;color:#fff;padding:14px;border-radius:14px;font-size:13px;white-space:pre-wrap}
@media(max-width:720px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}#panel{max-height:52svh}}
</style>
</head>
<body>
<div id="app"></div><div id="status">Loading 3D title…</div><div id="error"></div>
<button id="menuButton" type="button">Hide menu</button>
<section id="panel">
<div class="grid">
<label>Top text<input id="text1" type="text" value="J.S.R" maxlength="16"></label>
<label>Bottom text<input id="text2" type="text" value="Speed Dial" maxlength="16"></label>
<label>Glow color<input id="color" type="color" value="#713cff"></label>
<label>Background<select id="background"><option value="black" selected>Black</option><option value="green">Green screen</option><option value="transparent">Transparent</option></select></label>
<label>Text size <span id="sizeOut">1.00×</span><input id="size" type="range" min=".55" max="1.4" step=".01" value="1"></label>
<label>Animation speed <span id="speedOut">1.00×</span><input id="speed" type="range" min=".35" max="2.5" step=".05" value="1"></label>
<label>Bloom <span id="bloomOut">1.20</span><input id="bloom" type="range" min=".15" max="2.6" step=".05" value="1.2"></label>
<label>Letter stagger <span id="staggerOut">0.12 s</span><input id="stagger" type="range" min=".03" max=".35" step=".01" value=".12"></label>
<label>Second-line delay <span id="lineDelayOut">0.70 s</span><input id="lineDelay" type="range" min="0" max="3" step=".05" value=".7"></label>
<label>Line spacing <span id="lineGapOut">1.25</span><input id="lineGap" type="range" min=".7" max="2.2" step=".05" value="1.25"></label>
<label>Camera distance <span id="zoomOut">8.4</span><input id="zoom" type="range" min="6" max="13" step=".1" value="8.4"></label>
<label>Motion <span id="motionOut">1.00×</span><input id="motion" type="range" min=".25" max="1.8" step=".05" value="1"></label>
</div>
<div class="actions"><button class="primary" id="replay" type="button">Replay</button><button id="save" type="button">Save settings</button><button id="reset" type="button">Reset</button></div>
<div class="small">For CapCut: choose Green screen, hide the menu, tap Replay, then screen-record.</div>
</section>
<script>
(function(){
 const panel=document.getElementById('panel'),button=document.getElementById('menuButton');
 button.addEventListener('click',function(){const hidden=panel.classList.toggle('hidden');button.textContent=hidden?'Show menu':'Hide menu';});
 window.addEventListener('error',function(e){const box=document.getElementById('error');box.style.display='block';box.textContent='The 3D app hit an error:\n'+(e.message||'Unknown error');});
 window.addEventListener('unhandledrejection',function(e){const box=document.getElementById('error');box.style.display='block';box.textContent='The 3D app could not load:\n'+(e.reason?.message||e.reason||'Unknown error');});
})();
</script>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.170.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.170.0/examples/jsm/"}}</script>
<script type="module" src="./main.js"></script>
</body></html>
