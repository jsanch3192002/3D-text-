<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#02030b" />
  <title>Galaxy Dragon — 3D Chrome Title</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}
    *{box-sizing:border-box} html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#02030b}
    canvas{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
    #status{position:fixed;top:max(14px,env(safe-area-inset-top));left:16px;z-index:5;font-size:13px;color:#d8e4ff;text-shadow:0 1px 8px #000;pointer-events:none}
    #panel{position:fixed;z-index:10;right:12px;top:max(12px,env(safe-area-inset-top));width:min(330px,calc(100vw - 24px));max-height:calc(100vh - 24px);overflow:auto;padding:14px;border:1px solid #5064a766;border-radius:18px;background:#080b16df;backdrop-filter:blur(18px);box-shadow:0 20px 70px #0009}
    #panel.hidden{display:none}
    h1{font-size:15px;margin:0 0 12px;color:#eaf0ff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.full{grid-column:1/-1}
    label{font-size:11px;color:#9daed8;display:grid;gap:5px}input,select,button{width:100%;border:1px solid #53639866;border-radius:11px;background:#11162a;color:#fff;padding:9px;font:inherit}input[type=range]{padding:0;accent-color:#718cff}button{font-weight:700;cursor:pointer;background:linear-gradient(180deg,#26386d,#18254c)}button.secondary{background:#11162a}.row{display:flex;gap:8px}.row>*{flex:1}
    #showMenu{position:fixed;z-index:11;right:12px;top:max(12px,env(safe-area-inset-top));width:auto;padding:12px 16px;border-radius:999px;display:none}#showMenu.visible{display:block}
    .hint{font-size:10px;line-height:1.35;color:#7f8db3;margin-top:9px}
    @media(max-width:600px){#panel{top:auto;bottom:max(10px,env(safe-area-inset-bottom));max-height:52vh}#showMenu{top:12px}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"}}</script>
</head>
<body>
  <div id="status">Loading font and 3D engine…</div>
  <button id="showMenu">Show menu</button>
  <aside id="panel">
    <h1>Galaxy Dragon — Chrome 3D Title</h1>
    <div class="grid">
      <label class="full">Top line<input id="line1" value="GALAXY" maxlength="14"></label>
      <label class="full">Bottom line<input id="line2" value="DRAGON" maxlength="14"></label>
      <label>Letter spacing<input id="spacing" type="range" min="-0.25" max="0.55" step="0.01" value="0.06"></label>
      <label>Line gap<input id="lineGap" type="range" min="1.0" max="2.4" step="0.02" value="1.42"></label>
      <label>Depth<input id="depth" type="range" min="0.08" max="0.55" step="0.01" value="0.30"></label>
      <label>Bevel<input id="bevel" type="range" min="0" max="0.12" step="0.005" value="0.055"></label>
      <label>Glow<input id="bloom" type="range" min="0" max="2.2" step="0.05" value="0.85"></label>
      <label>Glow radius<input id="radius" type="range" min="0" max="1" step="0.02" value="0.48"></label>
      <label>Animation speed<input id="speed" type="range" min="0.35" max="2" step="0.05" value="1"></label>
      <label>Camera distance<input id="camera" type="range" min="6" max="15" step="0.1" value="9.6"></label>
      <label>Background<select id="background"><option value="space">Space</option><option value="black">Black</option><option value="green">Green screen</option></select></label>
      <label>Chrome tint<input id="tint" type="color" value="#507dff"></label>
      <div class="row full"><button id="apply">Apply text</button><button id="replay">Replay</button></div>
      <div class="row full"><button id="save" class="secondary">Save settings</button><button id="hide" class="secondary">Hide menu</button></div>
    </div>
    <div class="hint">Drag to orbit. Pinch to zoom. For CapCut, choose Green screen and screen-record in landscape.</div>
  </aside>
  <script type="module" src="./main.js"></script>
</body>
</html>
